<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Khagendra Neupane</title>
  <meta name="description" content="Explore insights on cybersecurity, networking, AI/ML, and technology from Khagendra Neupane's blog.">
  <meta name="keywords" content="blog, cybersecurity, networking, AI, machine learning, technology, tutorials, programming">
  <link rel="canonical" href="https://khagendraneupane.com.np/blog.html">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <!-- Boxicons & FontAwesome -->
  <link href='https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <!-- CSS Modules -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/sections.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Blog-specific styles */
    .blog-hero {
      background: var(--surface-abyss);
      padding: var(--spacing-120) 0 var(--spacing-48);
      text-align: center;
      color: var(--color-snow-sheet);
      position: relative;
      overflow: hidden;
    }
    .blog-hero h1 {
      font-family: var(--font-matter);
      font-size: var(--text-display);
      font-weight: var(--font-weight-regular);
      letter-spacing: var(--tracking-display);
      line-height: var(--leading-display);
      margin-bottom: var(--spacing-16);
    }
    .blog-hero p {
      font-family: var(--font-matter);
      font-size: var(--text-body-lg);
      color: var(--color-fog-veil);
    }
    
    .blog-container {
      max-width: var(--page-max-width);
      margin: 0 auto;
      padding: var(--spacing-40) var(--spacing-16);
    }
    
    .blog-filters {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-12);
      margin-bottom: var(--spacing-40);
      justify-content: center;
    }
    .filter-btn {
      padding: 10px 20px;
      border: 1px solid var(--color-ice-mist);
      background: transparent;
      color: var(--color-snow-sheet);
      border-radius: var(--radius-buttons);
      cursor: pointer;
      font-family: var(--font-matter);
      font-size: var(--text-caption);
      letter-spacing: var(--tracking-caption);
      text-transform: uppercase;
      transition: all 0.3s ease;
      font-weight: var(--font-weight-medium);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--gradient-current-gradient);
      color: var(--color-midnight-current);
      border-color: transparent;
    }
    
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: var(--spacing-24);
      margin-bottom: var(--spacing-48);
    }
    
    .blog-card {
      background-color: var(--surface-trench);
      border-radius: var(--radius-cards);
      overflow: hidden;
      transition: background-color 0.3s, transform 0.3s;
      cursor: pointer;
      position: relative;
      border: none;
      box-shadow: none;
    }
    .blog-card:hover {
      background-color: var(--surface-reef);
      transform: translateY(-4px);
    }
    
    .blog-card-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: var(--surface-reef);
      border-bottom: 1px solid var(--color-ash-gray);
    }
    
    .blog-card-content {
      padding: var(--card-padding);
    }
    
    .blog-genre {
      display: inline-block;
      padding: 4px 8px;
      border-radius: var(--radius-tags);
      font-size: var(--text-eyebrow);
      letter-spacing: var(--tracking-eyebrow);
      font-weight: var(--font-weight-medium);
      text-transform: uppercase;
      margin-bottom: var(--spacing-16);
      background: var(--surface-reef);
      color: var(--color-ice-mist);
    }
    
    .blog-card-title {
      font-family: var(--font-matter);
      font-size: var(--text-heading-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-snow-sheet);
      margin-bottom: var(--spacing-12);
      line-height: var(--leading-heading-sm);
      letter-spacing: var(--tracking-heading-sm);
    }
    
    .blog-card-excerpt {
      color: var(--color-fog-veil);
      line-height: var(--leading-body);
      font-size: var(--text-body);
      margin-bottom: var(--spacing-16);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .blog-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: var(--text-caption);
      color: var(--color-fog-veil);
    }
    
    .blog-card-date, .blog-card-read-time {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    /* Modal styles */
    .blog-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(1, 38, 36, 0.85);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s ease;
      padding: 1rem;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .blog-modal-content {
      background: var(--surface-trench);
      border-radius: var(--radius-cards);
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      border: 1px solid var(--color-ash-gray);
      color: var(--color-fog-veil);
    }
    .blog-modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--surface-reef);
      color: var(--color-snow-sheet);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background-color 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .blog-modal-close:hover {
      background: var(--color-abyssal-teal);
    }
    .blog-modal-body {
      padding: var(--card-padding);
    }
    .blog-modal-body h1, .blog-modal-body h2, .blog-modal-body h3 {
      color: var(--color-snow-sheet);
      margin-top: var(--spacing-28);
      margin-bottom: var(--spacing-12);
      font-weight: var(--font-weight-regular);
    }
    .blog-modal-body h1:first-child {
      margin-top: 0;
    }
    .blog-modal-body p {
      line-height: var(--leading-body);
      margin-bottom: var(--spacing-16);
      color: var(--color-fog-veil);
    }
    .blog-modal-body code {
      background: var(--surface-reef);
      color: var(--color-ice-mist);
      padding: 0.2rem 0.4rem;
      border-radius: var(--radius-tags);
      font-family: monospace;
    }
    .blog-modal-body pre {
      background: #000;
      color: #fff;
      padding: 1rem;
      border-radius: var(--radius-tags);
      overflow-x: auto;
      margin: var(--spacing-20) 0;
    }
    .blog-modal-body blockquote {
      border-left: 3px solid var(--color-ice-mist);
      padding-left: 1rem;
      margin: var(--spacing-20) 0;
      font-style: italic;
      color: var(--color-fog-veil);
    }
    
    /* Responsive design */
    @media (max-width: 768px) {
      .blog-hero h1 {
        font-size: var(--text-heading-lg);
      }
      .blog-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="l-header">
    <nav class="nav bd-grid">
      <div><a href="index.html" class="nav__logo"><span style="color:#00827c; font-size: 1.2rem;">▲</span> Khagendra</a></div>
      <div class="nav__menu" id="nav-menu">
        <ul class="nav__list">
          <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
          <li class="nav__item"><a href="blog.html" class="nav__link active-link">Blog</a></li>
        </ul>
      </div>
      <div class="nav__toggle" id="nav-toggle">
        <i class='bx bx-menu'></i>
      </div>
    </nav>
  </header>
  
  <main>
    <!-- Blog Hero Section -->
    <section class="blog-hero">
      <h1>Blog & Insights</h1>
      <p>Exploring cybersecurity, networking, AI/ML, and technology trends</p>
    </section>
    
    <!-- Blog Container -->
    <div class="blog-container">
      <!-- Filter Buttons -->
      <div class="blog-filters">
        <button class="filter-btn active" data-filter="all">All Posts</button>
        <button class="filter-btn" data-filter="tech">Tech</button>
        <button class="filter-btn" data-filter="tutorial">Tutorials</button>
        <button class="filter-btn" data-filter="lifestyle">Lifestyle</button>
        <button class="filter-btn" data-filter="news">News</button>
        <button class="filter-btn" data-filter="personal">Personal</button>
      </div>
      
      <!-- Blog Grid -->
      <div class="blog-grid" id="blog-grid">
        <!-- Posts will be dynamically inserted here -->
      </div>
    </div>
  </main>
  <script type="module">
    import { fetchAllPosts, fetchPostBySlug } from './js/blog-api.js';

    let allPosts = [];

    // Theme toggle functionality
    (function() {
      const toggleBtn = document.getElementById('theme-toggle');
      if (!toggleBtn) return;
      const icon = toggleBtn.querySelector('i');
      const body = document.body;
      const darkClass = 'dark-mode';
      
      function setTheme(dark) {
        if (dark) {
          body.classList.add(darkClass);
          icon.classList.remove('fa-moon');
          icon.classList.add('fa-sun');
          toggleBtn.setAttribute('aria-label', 'Switch to light mode');
        } else {
          body.classList.remove(darkClass);
          icon.classList.remove('fa-sun');
          icon.classList.add('fa-moon');
          toggleBtn.setAttribute('aria-label', 'Switch to dark mode');
        }
      }
      
      // Load preference
      let dark = false;
      if (localStorage.getItem('theme') === 'dark') {
        dark = true;
      } else if (localStorage.getItem('theme') === 'light') {
        dark = false;
      } else {
        dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }
      setTheme(dark);
      
      toggleBtn.addEventListener('click', function() {
        dark = !body.classList.contains(darkClass);
        setTheme(dark);
        localStorage.setItem('theme', dark ? 'dark' : 'light');
      });
    })();

    // Mobile menu toggle
    (function() {
      const navToggle = document.getElementById('nav-toggle');
      const navMenu = document.getElementById('nav-menu');
      
      if (navToggle && navMenu) {
        navToggle.addEventListener('click', function() {
          navMenu.classList.toggle('show');
        });
      }
    })();

    function renderPost(post) {
      const blogGrid = document.getElementById('blog-grid');
      const postCard = document.createElement('div');
      postCard.className = `blog-card ${post.genre}`;
      postCard.setAttribute('data-genre', post.genre);
      
      // Fallback image if none provided
      const imageUrl = post.image_url || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200"><rect width="400" height="200" fill="%236366f1"/><text x="200" y="100" text-anchor="middle" fill="white" font-family="Arial" font-size="16">Blog Post</text></svg>';

      postCard.innerHTML = `
        <img src="${imageUrl}" alt="${post.title}" class="blog-card-image" onerror="this.src='data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 400 200\'><rect width=\'400\' height=\'200\' fill=\'%236366f1\'/><text x=\'200\' y=\'100\' text-anchor=\'middle\' fill=\'white\' font-family=\'Arial\' font-size=\'16\'>Blog Post</text></svg>'">
        <div class="blog-card-content">
          <span class="blog-genre ${post.genre}">${post.genre}</span>
          <h3 class="blog-card-title">${post.title}</h3>
          <p class="blog-card-excerpt">${post.excerpt}</p>
          <div class="blog-card-meta">
            <div class="blog-card-date">
              <i class="fas fa-calendar"></i>
              <span>${new Date(post.published_at).toLocaleDateString()}</span>
            </div>
            <div class="blog-card-read-time">
              <i class="fas fa-clock"></i>
              <span>${post.read_time}</span>
            </div>
          </div>
        </div>
      `;
      
      postCard.addEventListener('click', function() {
        showBlogModal(post);
      });
      
      blogGrid.appendChild(postCard);
    }

    // Filter functionality
    async function filterPosts(genre) {
      const blogGrid = document.getElementById('blog-grid');
      blogGrid.innerHTML = '<div style="color: white; text-align: center; grid-column: 1/-1;">Loading...</div>';
      
      const filterBtns = document.querySelectorAll('.filter-btn');
      
      // Update active filter button
      filterBtns.forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.querySelector(`[data-filter="${genre}"]`);
      if (activeBtn) activeBtn.classList.add('active');
      
      // Fetch and render posts
      try {
        const posts = await fetchAllPosts(genre);
        blogGrid.innerHTML = '';
        
        if (posts.length === 0) {
          blogGrid.innerHTML = '<div style="color: white; text-align: center; grid-column: 1/-1;">No posts found.</div>';
          return;
        }

        posts.forEach(post => renderPost(post));
      } catch (err) {
        console.error('Error filtering posts:', err);
        blogGrid.innerHTML = '<div style="color: white; text-align: center; grid-column: 1/-1;">Error loading posts. Please try again later.</div>';
      }
    }

    // Modal logic for full post view
    function showBlogModal(post) {
      // Remove any existing modal
      const oldModal = document.querySelector('.blog-modal');
      if (oldModal) oldModal.remove();
      
      // Create modal
      const modal = document.createElement('div');
      modal.className = 'blog-modal';
      modal.innerHTML = `
        <div class="blog-modal-content">
          <button class="blog-modal-close" aria-label="Close">&times;</button>
          <div class="blog-modal-header">
            <span class="blog-genre ${post.genre}">${post.genre}</span>
            <h1 class="blog-card-title" style="margin: 1rem 0 0.5rem 0;">${post.title}</h1>
            <div class="blog-card-meta" style="margin-top: 1rem;">
              <div class="blog-card-date">
                <i class="fas fa-calendar"></i>
                <span>${new Date(post.published_at).toLocaleDateString()}</span>
              </div>
              <div class="blog-card-read-time">
                <i class="fas fa-clock"></i>
                <span>${post.read_time}</span>
              </div>
            </div>
          </div>
          <div class="blog-modal-body">
            ${marked.parse(post.content)}
          </div>
        </div>
      `;
      
      // Close modal functionality
      modal.querySelector('.blog-modal-close').onclick = function() {
        modal.remove();
      };
      
      // Close on backdrop click
      modal.onclick = function(e) {
        if (e.target === modal) {
          modal.remove();
        }
      };
      
      // Close on Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && document.querySelector('.blog-modal')) {
          modal.remove();
        }
      });
      
      document.body.appendChild(modal);
    }

    // Initialize blog
    document.addEventListener('DOMContentLoaded', async function() {
      const blogGrid = document.getElementById('blog-grid');
      blogGrid.innerHTML = '<div style="color: white; text-align: center; grid-column: 1/-1;">Loading posts...</div>';

      try {
        const posts = await fetchAllPosts();
        blogGrid.innerHTML = '';
        
        if (posts.length === 0) {
          blogGrid.innerHTML = '<div style="color: white; text-align: center; grid-column: 1/-1;">No posts found.</div>';
        } else {
          posts.forEach(post => renderPost(post));
        }
      } catch (err) {
        console.error('Error loading initial posts:', err);
        blogGrid.innerHTML = '<div style="color: white; text-align: center; grid-column: 1/-1;">Error loading posts. Please check your connection.</div>';
      }

      // Add filter event listeners
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const genre = this.getAttribute('data-filter');
          filterPosts(genre);
        });
      });
    });
  </script>
</body>
</html>
